name: Auto Scrape Steam Emails

on:
  schedule:
    - cron: '0 0,12 * * *'   # 每天 0 点和 12 点运行两次，避免额度超限
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 不设置全局 timeout，改为在脚本前加 timeout 命令

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (with soft timeout)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: |
          timeout 19500 python steam_curator_tool.py --mode 1 || echo "Stopped"

      - name: Commit and push updated CSV
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add steam_emails.csv owned_cache.json delisted_cache.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "🤖 Auto update CSV - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi