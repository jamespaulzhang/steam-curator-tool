name: Auto Scrape Steam Emails

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: true    

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (6h max)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: |
          timeout 21300 python steam_curator_tool.py --mode 1 || echo "Stopped"

      - name: Commit and push updated CSV
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          for file in steam_emails.csv owned_cache.json delisted_cache.json; do
            if [ -f "$file" ]; then
              git add "$file"
              echo "Added $file"
            else
              echo "$file not found, skipping."
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "🤖 Auto update CSV - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi